<!-- base.html を拡張する -->
{% extends "base.html" %}
<!-- base.html の contents を書き換える -->
{% block contents %}
<div class="card p-3">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="notification is-danger">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}
    <form method="POST">
        <label class="label" for="title">タイトル:</label>
        <input id="title" name="title" type="text"
            value="{{ it.title }}" class="input"
            placeholder="タイトルを入力してください">
        <label class="label" for="body">本文:</label>
        <textarea id="body" name="body"
            class="textarea">{{ it.body }}</textarea>
        <div class="buttons mt-2">
            <input type="submit" value="保存" class="button is-primary">
        </div>
    </form>
    {% if id and id != 0 %}
    <form method="POST" action="/memo/{{ id }}/delete">
        <input type="submit" value="削除" class="button is-danger"
            onclick="return confirm('このメモを削除しますか？')">
    </form>
    {% endif %}
</div>
{% endblock %}
